version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      types:
        patterns:
          - '@types/*'
      eslint:
        patterns:
          - eslint
          - eslint-*
          - '@typescript-eslint/*'
          - typescript-eslint
      vite:
        patterns:
          - vite
          - '@vitejs/*'
          - electron-vite
          - vitest
      react:
        patterns:
          - react
          - react-dom
      xterm:
        patterns:
          - '@xterm/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Etc/UTC
    labels:
      - dependencies
      - ci
    groups:
      actions:
        patterns:
          - '*'
